# photo_gallery.properties
# Configuration for generate_photo_gallery.sh
# Edit these values to control gallery generation.

# Directory where index.html (and paginated files) will be written.
# Can be absolute or relative to this file's location.
OUTPUT_DIR=/photosvideos/AZ_HTML/

# Sub-folder inside OUTPUT_DIR where all generated HTML files are placed.
# Can be absolute or relative to OUTPUT_DIR.
HTML_DIR=/photosvideos/AZ_HTML/

# Path to the folder containing photo album sub-directories.
# Can be absolute or relative to OUTPUT_DIR.
GALLERY_DIR=/photosvideos/AZ

# Name used for generated HTML files: {name}.html, {name}_2.html, ...
# Defaults to the GALLERY_DIR basename if not set.
GALLERY_NAME=AZ

# Number of album sections shown per page.
ALBUMS_PER_PAGE=1
