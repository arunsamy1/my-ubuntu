# photo_gallery.properties
# Configuration for generate_photo_gallery.sh
#
# Add one [SectionName] block per gallery.
# Each section generates its own set of HTML files.
# Required: HTML_DIR, GALLERY_DIR
# Optional: GALLERY_NAME (default: GALLERY_DIR basename), ALBUMS_PER_PAGE (default: 10)

[AZ]
# Directory where index.html (and paginated files) will be written.
HTML_DIR=/photosvideos/photo_galleries_html

# Path to the folder containing photo album sub-directories.
GALLERY_DIR=/photosvideos/photo_galleries/AZ

# Name used for generated HTML files: {name}.html, {name}_2.html, ...
GALLERY_NAME=AZ

# Number of album sections shown per page.
ALBUMS_PER_PAGE=1


[screenshots]
# Directory where index.html (and paginated files) will be written.
HTML_DIR=/photosvideos/photo_galleries_html

# Path to the folder containing photo album sub-directories.
GALLERY_DIR=/photosvideos/photo_galleries/screenshots

# Name used for generated HTML files: {name}.html, {name}_2.html, ...
GALLERY_NAME=screenshots

# Number of album sections shown per page.
ALBUMS_PER_PAGE=1
